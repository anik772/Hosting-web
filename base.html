<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}ANIK VPS — Premium Hosting{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box}
:root{
  --bg:#000814;
  --bg2:#001233;
  --panel:rgba(0, 20, 50, 0.85);
  --panel-solid:#001a3a;
  --border:rgba(0, 150, 255, 0.25);
  --text:#e8f4ff;
  --muted:#6ab0e6;
  --primary:#0088ff;
  --primary2:#00bbff;
  --accent:#00ddff;
  --ok:#00ff88;
  --warn:#ffaa00;
  --danger:#ff4466;
  --grad:linear-gradient(135deg,#0088ff 0%,#00bbff 50%,#00ddff 100%);
  --grad2:linear-gradient(135deg,#00bbff,#0088ff);
}
html,body{margin:0;padding:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body{
  background:
    radial-gradient(1200px 700px at 10% -10%, rgba(0,136,255,0.25), transparent 60%),
    radial-gradient(1000px 600px at 100% 0%, rgba(0,187,255,0.2), transparent 60%),
    radial-gradient(900px 500px at 50% 100%, rgba(0,221,255,0.15), transparent 60%),
    linear-gradient(180deg,#000814,#001233);
  background-attachment: fixed;
}
a{color:#66ccff;text-decoration:none}
a:hover{color:#99ddff}
.nav{
  position:sticky;top:0;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 28px;
  background:rgba(0,8,20,0.85);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:.3px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:var(--grad);display:grid;place-items:center;font-size:16px;box-shadow:0 6px 20px rgba(0,136,255,0.45)}
.nav-links{display:flex;gap:22px;align-items:center}
.nav-links a{color:#aac8ff;font-size:14px;font-weight:500}
.nav-links a:hover{color:#66ccff}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;border:0;cursor:pointer;font-weight:600;font-size:14px;font-family:inherit;transition:transform .15s, box-shadow .15s, filter .15s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.08)}
.btn-primary{background:var(--grad);color:#fff;box-shadow:0 8px 24px rgba(0,136,255,0.35)}
.btn-ghost{background:rgba(0,136,255,0.08);color:#66ccff;border:1px solid var(--border)}
.btn-ok{background:linear-gradient(135deg,#00ff88,#00cc66);color:#000}
.btn-warn{background:linear-gradient(135deg,#ffaa00,#ff8800);color:#000}
.btn-danger{background:linear-gradient(135deg,#ff4466,#cc1133);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.wrap{max-width:1180px;margin:32px auto;padding:0 20px}
.card{background:var(--panel);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}
.card + .card{margin-top:18px}
h1,h2,h3{margin:0 0 14px;font-weight:700;color:#e8f4ff}
h1{font-size:34px;letter-spacing:-0.5px}
h2{font-size:20px}
h3{font-size:16px}
input,select,textarea{
  padding:11px 13px;border-radius:10px;border:1px solid var(--border);
  background:rgba(0,10,30,0.8);color:var(--text);font-size:14px;font-family:inherit;
  transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus,textarea:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,136,255,0.2)}
input::placeholder{color:#4a7a9a}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.row > input{flex:1;min-width:130px}
.muted{color:#6ab0e6;font-size:13px}
.footer{text-align:center;padding:30px;color:#6ab0e6;font-size:13px;border-top:1px solid var(--border);margin-top:40px}
.gradient-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.badge-on{background:rgba(0,255,136,0.18);color:#00ff88;border:1px solid rgba(0,255,136,0.35)}
.badge-off{background:rgba(255,68,102,0.18);color:#ff4466;border:1px solid rgba(255,68,102,0.35)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{color:#6ab0e6;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{color:#c8e0ff}
form.inline{display:inline}
code{background:rgba(0,136,255,0.12);color:#66ccff;padding:2px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:12px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.float{animation:float 4s ease-in-out infinite}

.made-by {
  text-align: center;
  padding: 8px 0;
  font-size: 12px;
  letter-spacing: 3px;
  background: rgba(0,136,255,0.08);
  border-bottom: 1px solid var(--border);
  color: #6ab0e6;
}
.made-by span { 
  background: var(--grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-weight: 800;
}

.social-footer {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 20px 0 10px;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}
.social-footer a {
  color: #6ab0e6;
  font-size: 26px;
  transition: 0.3s ease;
}
.social-footer a:hover {
  transform: translateY(-4px) scale(1.15);
}
.social-footer .telegram:hover { color: #0088cc; text-shadow: 0 0 25px rgba(0,136,255,0.4); }
.social-footer .instagram:hover { color: #e4405f; text-shadow: 0 0 25px rgba(228,64,95,0.4); }
.social-footer .snapchat:hover { color: #fffc00; text-shadow: 0 0 25px rgba(255,252,0,0.4); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: #000814; }
::-webkit-scrollbar-thumb { background: #0088ff; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #00bbff; }
</style>
{% block head %}{% endblock %}
</head><body>

<!-- MADE BY ANIK -->
<div class="made-by">
  ⚡ MADE BY <span>ANIK</span> ⚡
</div>

<nav class="nav">
  <a href="/" class="brand"><span class="logo">⚡</span><span>ANIK<span class="gradient-text">VPS</span></span></a>
  <div class="nav-links">
    <a href="/home">Home</a>
    <a href="/pricing">Pricing</a>
    {% if session.username %}
      <span class="muted">{{session.username}}</span>
      <a href="/logout" class="btn btn-ghost btn-sm">Logout</a>
    {% else %}
      <a href="/login" class="btn btn-primary btn-sm">Login</a>
    {% endif %}
  </div>
</nav>

{% block body %}{% endblock %}

<!-- SOCIAL FOOTER -->
<div class="social-footer">
  <a href="https://t.me/iowntmc" target="_blank" class="telegram" title="Telegram">
    <i class="fa-brands fa-telegram"></i>
  </a>
  <a href="https://instagram.com/anik.saif1" target="_blank" class="instagram" title="Instagram">
    <i class="fa-brands fa-instagram"></i>
  </a>
  <a href="#" target="_blank" class="snapchat" title="Snapchat">
    <i class="fa-brands fa-snapchat"></i>
  </a>
</div>

<div class="footer">© 2026 <span class="gradient-text">ANIK VPS</span> —  ❤️ BY ANIK ·</div>

</body></html>
