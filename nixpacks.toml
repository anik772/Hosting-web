[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "python311Packages.gunicorn", "python311Packages.flask"]

[phases.install]
cmds = ["python3 -m pip install --break-system-packages -r requirements.txt"]

[start]
cmd = "python3 -m gunicorn --bind 0.0.0.0:8000 --workers 1 --threads 8 app:app"
